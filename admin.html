<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Hoor Garments</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
:root {
  --pink:#FF6B9D; --purple:#CE93D8; --blue:#4FC3F7; --green:#81C784;
  --dark:#2D2640; --text:#4A4260; --light:#F3EFF8; --bg:#FFF8F0;
  --radius:16px; --shadow:0 8px 32px rgba(45,38,64,.10);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* LOGIN SCREEN */
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.login-card{background:#fff;padding:2.5rem 2rem;border-radius:var(--radius);box-shadow:var(--shadow);max-width:360px;width:100%;text-align:center}
.login-card h1{font-family:'Baloo 2',cursive;font-size:1.5rem;color:var(--dark);margin-bottom:.3rem}
.login-card p{color:#aaa;font-size:.85rem;margin-bottom:1.5rem}
.login-card input{width:100%;padding:.7rem 1rem;border:2px solid #EDE8F5;border-radius:12px;font-family:'Nunito',sans-serif;font-size:.9rem;margin-bottom:1rem;outline:none}
.login-card input:focus{border-color:var(--pink)}
.login-card button{width:100%;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none;border-radius:12px;padding:.75rem;font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;cursor:pointer}
#loginError{color:#e53e3e;font-size:.8rem;margin-top:.6rem;display:none}

/* ADMIN APP */
#adminApp{display:none}
header{background:#fff;box-shadow:0 2px 20px rgba(0,0,0,.08);padding:1rem 1.5rem}
.hdr{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
.logo-main{font-family:'Baloo 2',cursive;font-size:1.3rem;font-weight:800;color:var(--dark)}
.logo-sub{font-size:.7rem;color:var(--pink);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.logout-btn{background:var(--light);border:none;border-radius:50px;padding:.5rem 1.1rem;font-family:'Nunito',sans-serif;font-weight:700;font-size:.8rem;cursor:pointer;color:var(--text)}
.logout-btn:hover{background:#eee}

.container{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}

/* FORM CARD */
.form-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:1.75rem;margin-bottom:2rem}
.form-card h2{font-family:'Baloo 2',cursive;color:var(--dark);margin-bottom:1.2rem;font-size:1.2rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:640px){.form-grid{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:.35rem}
.field.full{grid-column:1/-1}
.field label{font-size:.8rem;font-weight:700;color:var(--dark)}
.field input,.field select{padding:.6rem .8rem;border:2px solid #EDE8F5;border-radius:10px;font-family:'Nunito',sans-serif;font-size:.88rem;outline:none}
.field input:focus,.field select:focus{border-color:var(--pink)}

.upload-zone{border:2px dashed #EDE8F5;border-radius:12px;padding:1.2rem;text-align:center;cursor:pointer;transition:.2s;position:relative}
.upload-zone:hover{border-color:var(--pink)}
.upload-zone.uploading{opacity:.6;pointer-events:none}
#imgPreview{max-width:120px;max-height:120px;border-radius:10px;margin-top:.6rem;display:none}
.upload-status{font-size:.78rem;color:#aaa;margin-top:.4rem}

.btn-row{display:flex;gap:.75rem;margin-top:1.4rem}
.btn-primary{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;border:none;border-radius:12px;padding:.75rem 1.6rem;font-family:'Nunito',sans-serif;font-weight:800;font-size:.9rem;cursor:pointer}
.btn-primary:hover{opacity:.9}
.btn-secondary{background:var(--light);color:var(--text);border:none;border-radius:12px;padding:.75rem 1.6rem;font-family:'Nunito',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer}

/* PRODUCTS TABLE */
.table-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:1.5rem;overflow-x:auto}
.table-card h2{font-family:'Baloo 2',cursive;color:var(--dark);margin-bottom:1rem;font-size:1.2rem}
table{width:100%;border-collapse:collapse;min-width:640px}
th{text-align:left;padding:.7rem .8rem;font-size:.75rem;color:#aaa;border-bottom:2px solid #f0eaf8;text-transform:uppercase;letter-spacing:.04em}
td{padding:.7rem .8rem;border-bottom:1px solid #f7f2fd;font-size:.85rem;vertical-align:middle}
tr:hover td{background:var(--light)}
td img{width:44px;height:44px;border-radius:8px;object-fit:cover}
.tbl-name{font-weight:700;color:var(--dark)}
.tbl-price{font-weight:800;color:var(--pink)}
.action-btn{border:none;background:none;cursor:pointer;font-size:1rem;padding:.2rem .4rem}
.empty-row td{text-align:center;color:#bbb;padding:2rem}

.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--dark);color:#fff;padding:.7rem 1.4rem;border-radius:50px;font-size:.85rem;font-weight:700;transition:.3s;z-index:999}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-card">
    <h1>🔒 Admin Panel</h1>
    <p>Hoor Garments — products manage karein</p>
    <input type="password" id="pwInput" placeholder="Password daalein" onkeydown="if(event.key==='Enter')tryLogin()">
    <button onclick="tryLogin()">Login</button>
    <div id="loginError">Galat password, dobara koshish karein.</div>
  </div>
</div>

<!-- ADMIN APP -->
<div id="adminApp">
  <header>
    <div class="hdr">
      <div>
        <div class="logo-main">Hoor Garments</div>
        <div class="logo-sub">Admin Panel</div>
      </div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="container">

    <!-- ADD / EDIT PRODUCT FORM -->
    <div class="form-card">
      <h2 id="formTitle">➕ Naya Product Add Karein</h2>
      <div class="form-grid">
        <div class="field full">
          <label>Product ka Naam</label>
          <input type="text" id="f_name" placeholder="e.g. Soft Cotton Romper">
        </div>
        <div class="field">
          <label>Price (Rs.)</label>
          <input type="number" id="f_price" placeholder="e.g. 550">
        </div>
        <div class="field">
          <label>Old Price (optional, sale ke liye)</label>
          <input type="number" id="f_oldprice" placeholder="e.g. 700">
        </div>
        <div class="field">
          <label>Category</label>
          <select id="f_category">
            <option value="garments">👗 Garments</option>
            <option value="toys">🧸 Toys</option>
            <option value="accessories">🎒 Accessories</option>
          </select>
        </div>
        <div class="field">
          <label>Age Group</label>
          <select id="f_age">
            <option value="baby">🍼 Baby (0-2 yrs)</option>
            <option value="kids">🎨 Kids (3-8 yrs)</option>
            <option value="tween">🌟 Pre-Teen (9-12 yrs)</option>
          </select>
        </div>
        <div class="field">
          <label>Gender</label>
          <select id="f_gender">
            <option value="all">👶 All</option>
            <option value="boy">👦 Boys</option>
            <option value="girl">👧 Girls</option>
          </select>
        </div>
        <div class="field">
          <label>Stock (Quantity)</label>
          <input type="number" id="f_stock" placeholder="e.g. 50" value="100">
        </div>
        <div class="field full">
          <label>Product Image</label>
          <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
            <span id="uploadLabel">📷 Click karke image select karein (Cloudinary par upload hogi)</span>
            <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileSelect(event)">
            <img id="imgPreview">
            <div class="upload-status" id="uploadStatus"></div>
          </div>
          <input type="hidden" id="f_imageurl">
        </div>
      </div>
      <div class="btn-row">
        <button class="btn-primary" onclick="saveProduct()">💾 Save Product</button>
        <button class="btn-secondary" id="cancelEditBtn" style="display:none" onclick="cancelEdit()">Cancel</button>
      </div>
    </div>

    <!-- PRODUCTS TABLE -->
    <div class="table-card">
      <h2>📦 Sab Products</h2>
      <table>
        <thead>
          <tr><th>Image</th><th>Naam</th><th>Category</th><th>Price</th><th>Stock</th><th>Actions</th></tr>
        </thead>
        <tbody id="productsTableBody">
          <tr class="empty-row"><td colspan="6">Loading...</td></tr>
        </tbody>
      </table>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════
// LOGIN
// ════════════════════════════════════════════
function tryLogin() {
  const val = document.getElementById('pwInput').value;
  if (val === ADMIN_PASSWORD) {
    sessionStorage.setItem('hg_admin_auth', 'true');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminApp').style.display = 'block';
    loadProducts();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
function logout() {
  sessionStorage.removeItem('hg_admin_auth');
  location.reload();
}
if (sessionStorage.getItem('hg_admin_auth') === 'true') {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminApp').style.display = 'block';
}

// ════════════════════════════════════════════
// CLOUDINARY UPLOAD
// ════════════════════════════════════════════
async function handleFileSelect(event) {
  const file = event.target.files[0];
  if (!file) return;

  const zone = document.getElementById('uploadZone');
  const status = document.getElementById('uploadStatus');
  zone.classList.add('uploading');
  status.textContent = 'Uploading to Cloudinary...';

  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

  try {
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
      method: 'POST',
      body: formData
    });
    const data = await res.json();
    if (data.secure_url) {
      document.getElementById('f_imageurl').value = data.secure_url;
      document.getElementById('imgPreview').src = data.secure_url;
      document.getElementById('imgPreview').style.display = 'block';
      document.getElementById('uploadLabel').textContent = '✅ Image upload ho gayi. Change karne ke liye dobara click karein.';
      status.textContent = '';
    } else {
      status.textContent = '❌ Upload fail. Cloudinary preset check karein.';
      console.error(data);
    }
  } catch (err) {
    status.textContent = '❌ Upload fail. Internet ya config check karein.';
    console.error(err);
  }
  zone.classList.remove('uploading');
}

// ════════════════════════════════════════════
// PRODUCTS CRUD
// ════════════════════════════════════════════
let editingId = null;
let productsCache = [];

async function loadProducts() {
  const { data, error } = await supabaseClient.from('products').select('*').order('created_at', { ascending: false });
  const tbody = document.getElementById('productsTableBody');
  if (error) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="6">Load nahi ho saka: ${error.message}</td></tr>`;
    return;
  }
  productsCache = data || [];
  if (!productsCache.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="6">Abhi koi product nahi hai. Upar se add karein!</td></tr>`;
    return;
  }
  tbody.innerHTML = productsCache.map(p => `
    <tr>
      <td><img src="${p.image_url || 'https://placehold.co/60x60/F3EFF8/CE93D8?text=No+Img'}"></td>
      <td class="tbl-name">${p.name}</td>
      <td>${p.category}</td>
      <td class="tbl-price">Rs.${p.price}</td>
      <td>${p.stock ?? '-'}</td>
      <td>
        <button class="action-btn" title="Edit" onclick="editProduct('${p.id}')">✏️</button>
        <button class="action-btn" title="Delete" onclick="deleteProduct('${p.id}')">🗑️</button>
      </td>
    </tr>`).join('');
}

function resetForm() {
  document.getElementById('f_name').value = '';
  document.getElementById('f_price').value = '';
  document.getElementById('f_oldprice').value = '';
  document.getElementById('f_category').value = 'garments';
  document.getElementById('f_age').value = 'baby';
  document.getElementById('f_gender').value = 'all';
  document.getElementById('f_stock').value = 100;
  document.getElementById('f_imageurl').value = '';
  document.getElementById('imgPreview').style.display = 'none';
  document.getElementById('uploadLabel').textContent = '📷 Click karke image select karein (Cloudinary par upload hogi)';
  document.getElementById('formTitle').textContent = '➕ Naya Product Add Karein';
  document.getElementById('cancelEditBtn').style.display = 'none';
  editingId = null;
}

async function saveProduct() {
  const name = document.getElementById('f_name').value.trim();
  const price = document.getElementById('f_price').value;
  const oldPrice = document.getElementById('f_oldprice').value;
  const category = document.getElementById('f_category').value;
  const age_group = document.getElementById('f_age').value;
  const gender = document.getElementById('f_gender').value;
  const stock = document.getElementById('f_stock').value;
  const image_url = document.getElementById('f_imageurl').value;

  if (!name || !price) {
    showToast('⚠️ Naam aur price zaroori hain');
    return;
  }

  const payload = {
    name, price: Number(price),
    old_price: oldPrice ? Number(oldPrice) : null,
    category, age_group, gender,
    stock: stock ? Number(stock) : 100,
    image_url: image_url || null
  };

  let result;
  if (editingId) {
    result = await supabaseClient.from('products').update(payload).eq('id', editingId);
  } else {
    result = await supabaseClient.from('products').insert(payload);
  }

  if (result.error) {
    showToast('❌ Error: ' + result.error.message);
    return;
  }

  showToast(editingId ? '✅ Product update ho gaya' : '✅ Product add ho gaya');
  resetForm();
  loadProducts();
}

function editProduct(id) {
  const p = productsCache.find(x => x.id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('f_name').value = p.name;
  document.getElementById('f_price').value = p.price;
  document.getElementById('f_oldprice').value = p.old_price || '';
  document.getElementById('f_category').value = p.category;
  document.getElementById('f_age').value = p.age_group;
  document.getElementById('f_gender').value = p.gender;
  document.getElementById('f_stock').value = p.stock ?? 100;
  document.getElementById('f_imageurl').value = p.image_url || '';
  if (p.image_url) {
    document.getElementById('imgPreview').src = p.image_url;
    document.getElementById('imgPreview').style.display = 'block';
  }
  document.getElementById('formTitle').textContent = '✏️ Product Edit Karein';
  document.getElementById('cancelEditBtn').style.display = 'inline-block';
  window.scrollTo({top:0, behavior:'smooth'});
}

function cancelEdit() {
  resetForm();
}

async function deleteProduct(id) {
  if (!confirm('Kya aap is product ko delete karna chahte hain?')) return;
  const { error } = await supabaseClient.from('products').delete().eq('id', id);
  if (error) {
    showToast('❌ Delete fail: ' + error.message);
    return;
  }
  showToast('🗑️ Product delete ho gaya');
  loadProducts();
}

// ════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}
</script>
</body>
</html>
